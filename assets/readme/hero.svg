<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">CIF2Peaks</title>
  <desc id="desc">Convert CIF crystal structures into indexed theoretical powder XRD peak tables for Excel and Origin.</desc>
  <rect width="1200" height="360" rx="26" fill="#F2EDE3"/>
  <rect x="0" y="0" width="16" height="360" fill="#1F7A4C"/>
  <path d="M0 56H1200" stroke="#D8D0C2"/>
  <g transform="translate(56 44)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text fill="#5E5A52" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" letter-spacing="2.2">CIF → INDEXED POWDER PEAK TABLES</text>
    <text y="96" fill="#12110E" font-size="58" font-weight="780" letter-spacing="-1.8">CIF2Peaks</text>
    <text y="144" fill="#3A3630" font-size="23">Theoretical hkl · d · 2θ · q for materials research.</text>
    <path d="M0 172H480" stroke="#C8C0B2"/>
    <g transform="translate(0 208)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">
      <text fill="#12110E">BATCH</text>
      <text x="90" fill="#5E5A52">EXCEL</text>
      <text x="172" fill="#5E5A52">GUI / CLI</text>
      <text x="280" fill="#1F7A4C">PhaseScout Cij</text>
    </g>
    <text y="270" fill="#7A7468" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">not Rietveld · not phase-ID database · MIT</text>
  </g>
  <g transform="translate(700 48)">
    <rect width="440" height="264" fill="#12110E"/>
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <text x="24" y="32" fill="#6A9078" font-size="12">COMBINED PEAKS · THEORETICAL</text>
      <rect x="24" y="48" width="392" height="32" fill="#1C1A16"/>
      <text x="32" y="69" fill="#7ECFA0" font-size="12">hkl</text>
      <text x="100" y="69" fill="#7ECFA0" font-size="12">d_Å</text>
      <text x="180" y="69" fill="#7ECFA0" font-size="12">2θ°</text>
      <text x="260" y="69" fill="#7ECFA0" font-size="12">I_rel</text>
      <text x="340" y="69" fill="#7ECFA0" font-size="12">E_hkl</text>
      <g fill="#EDE8DC" font-size="14">
        <text x="32" y="112">111</text><text x="100" y="112">2.340</text><text x="180" y="112">38.42</text><text x="260" y="112">100</text><text x="340" y="112">210</text>
        <text x="32" y="148">200</text><text x="100" y="148">2.027</text><text x="180" y="148">44.51</text><text x="260" y="148">48</text><text x="340" y="148">198</text>
        <text x="32" y="184">220</text><text x="100" y="184">1.433</text><text x="180" y="184">64.58</text><text x="260" y="184">32</text><text x="340" y="184">185</text>
        <text x="32" y="220">311</text><text x="100" y="220">1.222</text><text x="180" y="220">77.63</text><text x="260" y="220">28</text><text x="340" y="220">172</text>
      </g>
      <text x="24" y="252" fill="#6A655C" font-size="11">Summary · Combined Peaks · Elastic Constants</text>
    </g>
  </g>
  <text x="1144" y="336" text-anchor="end" fill="#8A8478" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">D-sudoasd / CIF2Peaks</text>
</svg>
